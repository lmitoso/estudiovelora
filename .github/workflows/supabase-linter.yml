name: Supabase Security Linter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Run Supabase DB Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Run security & performance linter
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          echo "::group::Security lints"
          supabase db lint --linked --level warning --schema public --config security \
            | tee security.txt
          echo "::endgroup::"

          # Fail if any error/warning level finding is reported
          if grep -E "level (error|warning)" security.txt > /dev/null; then
            echo "::error::Supabase linter found security issues. See log above."
            exit 1
          fi
          echo "No linter issues found."
